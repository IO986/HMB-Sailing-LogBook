name: iOS Build (unsigned – Sideloadly)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Get version from pubspec
        id: version
        run: echo "version=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)" >> $GITHUB_OUTPUT

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "HMB-Sailing-Log-v${{ steps.version.outputs.version }}.ipa" Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HMB-Sailing-Log-v${{ steps.version.outputs.version }}-iOS
          path: "*.ipa"
          retention-days: 30
