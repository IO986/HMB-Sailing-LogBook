name: hmb_sailing_log
description: HMB Sailing Log - profesionálny lodný denník pre jachtárov
publish_to: 'none'
version: 1.15.0+15

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  intl: 0.20.2
  share_plus: ^10.1.4
  pdf: ^3.11.1
  printing: ^5.13.1
  screenshot: ^3.0.0
  flutter_background_service: ^5.0.5
  wakelock_plus: ^1.2.5
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  signature: ^5.4.0
  crypto: ^3.0.3
  barcode: ^2.2.3
  flutter_ringtone_player: ^4.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/maps/
