name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # hmb_core is a separate private repo, consumed as a sibling path
      # dependency (pubspec.yaml: `hmb_core: { path: ../hmb_core }`) — same
      # layout as local dev. Pinned to a tag, not a branch, so CI builds
      # against a known-stable hmb_core release rather than whatever main
      # happens to contain at build time.
      - name: Checkout hmb_core
        uses: actions/checkout@v4
        with:
          repository: IO986/hmb_core
          ref: v1.0.0
          token: ${{ secrets.HMB_CORE_PAT }}
          path: ../hmb_core

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Pin intl (flutter pub get can bump it)
        run: flutter pub add intl:^0.20.2

      - name: Generate code (drift/build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
